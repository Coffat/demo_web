<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - StarShop 🌸</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Custom Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#F06292',
                            light: '#FFC1E3',
                            dark: '#E91E63',
                            hover: '#EC407A'
                        },
                        secondary: '#81C784'
                    },
                    boxShadow: {
                        'soft': '0 4px 20px rgba(248, 180, 217, 0.15)',
                        'hover': '0 8px 25px rgba(236, 64, 122, 0.2)'
                    }
                }
            }
        }
    </script>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        /* Background image with soft blur like the login page */
        .bg-photo {
            position: fixed;
            inset: 0;
            background-image: url('https://images.unsplash.com/photo-1522383225653-ed111181a951?ixlib=rb-4.0.3&auto=format&fit=crop&w=2076&q=80');
            background-size: cover;
            background-position: center;
            filter: blur(4px) brightness(0.95);
            transform: scale(1.05);
            z-index: 0;
        }

        /* Soft gradient overlay for readability */
        .bg-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at top left, rgba(255,255,255,0.6), rgba(255,255,255,0.2) 40%, rgba(255,255,255,0.1) 70%),
                        linear-gradient(135deg, rgba(248, 187, 217, 0.25), rgba(232, 245, 232, 0.2));
            z-index: 1;
        }

        .floating-petals {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 2; /* above background, below card */
        }

        .petal {
            position: absolute;
            font-size: 20px;
            opacity: 0.6;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                top: -10px;
                transform: rotate(0deg);
                opacity: 0.8;
            }
            100% {
                top: 110vh;
                transform: rotate(360deg);
                opacity: 0;
            }
        }

        .petal:nth-child(1) { left: 10%; animation-duration: 8s; animation-delay: 0s; }
        .petal:nth-child(2) { left: 20%; animation-duration: 10s; animation-delay: 1s; }
        .petal:nth-child(3) { left: 30%; animation-duration: 12s; animation-delay: 2s; }
        .petal:nth-child(4) { left: 40%; animation-duration: 9s; animation-delay: 3s; }
        .petal:nth-child(5) { left: 50%; animation-duration: 11s; animation-delay: 4s; }
        .petal:nth-child(6) { left: 60%; animation-duration: 13s; animation-delay: 5s; }
        .petal:nth-child(7) { left: 70%; animation-duration: 8s; animation-delay: 6s; }
        .petal:nth-child(8) { left: 80%; animation-duration: 10s; animation-delay: 7s; }

        /* Animated gradient button */
        .btn-gradient {
            background-image: linear-gradient(90deg, #EC407A, #AD1457, #EC407A);
            background-size: 200% 100%;
            color: #fff;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-position 0.5s ease;
            animation: gradient-move 3s ease infinite;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(236, 64, 122, 0.35);
            background-position: 100% 50%;
        }

        .btn-gradient:active {
            transform: translateY(0);
            box-shadow: 0 6px 18px rgba(236, 64, 122, 0.3);
        }

        .btn-gradient:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(236, 64, 122, 0.2), 0 8px 24px rgba(236, 64, 122, 0.35);
        }

        @keyframes gradient-move {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">
    <!-- Blurred background photo -->
    <div class="bg-photo"></div>
    <div class="bg-overlay"></div>
    
    <!-- Floating Petals Animation -->
    <div class="floating-petals">
        <div class="petal">🌸</div>
        <div class="petal">🌸</div>
        <div class="petal">🌸</div>
        <div class="petal">🌸</div>
        <div class="petal">🌸</div>
        <div class="petal">🌸</div>
        <div class="petal">🌸</div>
        <div class="petal">🌸</div>
    </div>
    
    <!-- Register Card -->
    <div class="w-full max-w-xl bg-white backdrop-blur-xl rounded-3xl shadow-2xl overflow-hidden relative z-10 hover:shadow-hover transition-all duration-300">
        
        <!-- Register Form -->
        <div class="p-6 md:p-8 flex flex-col justify-center" x-data="{ showPassword: false, showConfirmPassword: false }">
            <!-- Header -->
            <div class="text-center mb-4">
                <h2 class="text-3xl font-bold bg-gradient-to-r from-primary to-primary-hover bg-clip-text text-transparent mb-2">
                    Tạo tài khoản mới 🎉
                </h2>
                <p class="text-gray-600">Điền thông tin để bắt đầu</p>
            </div>
            
            <!-- Error Alert -->
            <div th:if="${error}" class="mb-4 p-4 bg-red-50 border-l-4 border-red-500 rounded-lg flex items-start gap-3">
                <svg class="w-5 h-5 text-red-500 flex-shrink-0 mt-0.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16ZM8.28 7.22a.75.75 0 0 0-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 1 0 1.06 1.06L10 11.06l1.72 1.72a.75.75 0 1 0 1.06-1.06L11.06 10l1.72-1.72a.75.75 0 0 0-1.06-1.06L10 8.94 8.28 7.22Z" clip-rule="evenodd" />
                </svg>
                <span class="text-sm text-red-700 font-medium" th:text="${error}">Lỗi</span>
            </div>
            
            <!-- Register Form -->
            <form th:action="@{/register}" method="post" class="space-y-3">
                <!-- Full Name -->
                <div>
                    <label for="fullName" class="block text-sm font-semibold text-gray-700 mb-2">
                        Họ và tên
                    </label>
                    <input type="text" 
                           id="fullName" 
                           name="fullName" 
                           required
                           placeholder="Nguyễn Văn A"
                           class="w-full px-3.5 py-2.5 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-primary focus:bg-white focus:ring-4 focus:ring-primary/10 transition-all duration-200 outline-none">
                </div>
                
                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">
                        Email
                    </label>
                    <input type="email" 
                           id="email" 
                           name="email" 
                           required
                           placeholder="email@example.com"
                           class="w-full px-3.5 py-2.5 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-primary focus:bg-white focus:ring-4 focus:ring-primary/10 transition-all duration-200 outline-none">
                </div>
                
                <!-- Phone -->
                <div>
                    <label for="phone" class="block text-sm font-semibold text-gray-700 mb-2">
                        Số điện thoại
                    </label>
                    <input type="tel" 
                           id="phone" 
                           name="phone" 
                           required
                           placeholder="0901234567"
                           pattern="[0-9]{10}"
                           class="w-full px-3.5 py-2.5 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-primary focus:bg-white focus:ring-4 focus:ring-primary/10 transition-all duration-200 outline-none">
                </div>
                
                <!-- Username -->
                <div>
                    <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">
                        Tên đăng nhập
                    </label>
                    <input type="text" 
                           id="username" 
                           name="username" 
                           required
                           placeholder="username"
                           minlength="4"
                           class="w-full px-3.5 py-2.5 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-primary focus:bg-white focus:ring-4 focus:ring-primary/10 transition-all duration-200 outline-none">
                </div>
                
                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">
                        Mật khẩu
                    </label>
                    <div class="relative">
                        <input :type="showPassword ? 'text' : 'password'" 
                               id="password" 
                               name="password" 
                               required
                               minlength="6"
                               placeholder="Tối thiểu 6 ký tự"
                               class="w-full px-3.5 py-2.5 pr-10 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-primary focus:bg-white focus:ring-4 focus:ring-primary/10 transition-all duration-200 outline-none">
                        <button type="button" 
                                @click="showPassword = !showPassword"
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary transition-colors">
                            <svg x-show="!showPassword" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M10 12.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z" />
                                <path fill-rule="evenodd" d="M.664 10.59a1.651 1.651 0 0 1 0-1.186A10.004 10.004 0 0 1 10 3c4.257 0 7.893 2.66 9.336 6.41.147.381.146.804 0 1.186A10.004 10.004 0 0 1 10 17c-4.257 0-7.893-2.66-9.336-6.41ZM14 10a4 4 0 1 1-8 0 4 4 0 0 1 8 0Z" clip-rule="evenodd" />
                            </svg>
                            <svg x-show="showPassword" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" style="display: none;">
                                <path fill-rule="evenodd" d="M3.28 2.22a.75.75 0 0 0-1.06 1.06l14.5 14.5a.75.75 0 1 0 1.06-1.06l-1.745-1.745a10.029 10.029 0 0 0 3.3-4.38 1.651 1.651 0 0 0 0-1.185A10.004 10.004 0 0 0 9.999 3a9.956 9.956 0 0 0-4.744 1.194L3.28 2.22ZM7.752 6.69l1.092 1.092a2.5 2.5 0 0 1 3.374 3.373l1.091 1.092a4 4 0 0 0-5.557-5.557Z" clip-rule="evenodd" />
                                <path d="m10.748 13.93 2.523 2.523a9.987 9.987 0 0 1-3.27.547c-4.258 0-7.894-2.66-9.337-6.41a1.651 1.651 0 0 1 0-1.186A10.007 10.007 0 0 1 2.839 6.02L6.07 9.252a4 4 0 0 0 4.678 4.678Z" />
                            </svg>
                        </button>
                    </div>
                </div>
                
                <!-- Confirm Password -->
                <div>
                    <label for="confirmPassword" class="block text-sm font-semibold text-gray-700 mb-2">
                        Xác nhận mật khẩu
                    </label>
                    <div class="relative">
                        <input :type="showConfirmPassword ? 'text' : 'password'" 
                               id="confirmPassword" 
                               name="confirmPassword" 
                               required
                               placeholder="Nhập lại mật khẩu"
                               class="w-full px-3.5 py-2.5 pr-10 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-primary focus:bg-white focus:ring-4 focus:ring-primary/10 transition-all duration-200 outline-none">
                        <button type="button" 
                                @click="showConfirmPassword = !showConfirmPassword"
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary transition-colors">
                            <svg x-show="!showConfirmPassword" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M10 12.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z" />
                                <path fill-rule="evenodd" d="M.664 10.59a1.651 1.651 0 0 1 0-1.186A10.004 10.004 0 0 1 10 3c4.257 0 7.893 2.66 9.336 6.41.147.381.146.804 0 1.186A10.004 10.004 0 0 1 10 17c-4.257 0-7.893-2.66-9.336-6.41ZM14 10a4 4 0 1 1-8 0 4 4 0 0 1 8 0Z" clip-rule="evenodd" />
                            </svg>
                            <svg x-show="showConfirmPassword" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" style="display: none;">
                                <path fill-rule="evenodd" d="M3.28 2.22a.75.75 0 0 0-1.06 1.06l14.5 14.5a.75.75 0 1 0 1.06-1.06l-1.745-1.745a10.029 10.029 0 0 0 3.3-4.38 1.651 1.651 0 0 0 0-1.185A10.004 10.004 0 0 0 9.999 3a9.956 9.956 0 0 0-4.744 1.194L3.28 2.22ZM7.752 6.69l1.092 1.092a2.5 2.5 0 0 1 3.374 3.373l1.091 1.092a4 4 0 0 0-5.557-5.557Z" clip-rule="evenodd" />
                                <path d="m10.748 13.93 2.523 2.523a9.987 9.987 0 0 1-3.27.547c-4.258 0-7.894-2.66-9.337-6.41a1.651 1.651 0 0 1 0-1.186A10.007 10.007 0 0 1 2.839 6.02L6.07 9.252a4 4 0 0 0 4.678 4.678Z" />
                            </svg>
                        </button>
                    </div>
                </div>
                
                <!-- Terms & Conditions -->
                <div class="flex items-start gap-2">
                    <input type="checkbox" 
                           id="terms" 
                           name="terms" 
                           required
                           class="mt-1 w-4 h-4 rounded border-gray-300 text-primary focus:ring-primary focus:ring-2">
                    <label for="terms" class="text-sm text-gray-600">
                        Tôi đồng ý với 
                        <a href="/terms" class="text-primary-dark hover:text-primary font-semibold">Điều khoản dịch vụ</a> 
                        và 
                        <a href="/privacy" class="text-primary-dark hover:text-primary font-semibold">Chính sách bảo mật</a>
                    </label>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" 
                        class="w-full py-3 btn-gradient font-semibold rounded-xl hover:-translate-y-0.5 active:translate-y-0">
                    Đăng ký ngay
                </button>
            </form>
            
            <!-- Login Link -->
            <p class="mt-6 text-center text-sm text-gray-600">
                Đã có tài khoản? 
                <a href="/login" class="text-primary-dark hover:text-primary font-semibold transition-colors">
                    Đăng nhập
                </a>
            </p>
        </div>
    </div>
    
    <!-- Back to Home -->
    <a href="/" class="fixed top-6 left-6 flex items-center gap-2 px-4 py-2 bg-white/90 backdrop-blur-sm rounded-full shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all duration-200 group z-20">
        <svg class="w-5 h-5 text-primary group-hover:-translate-x-1 transition-transform" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M17 10a.75.75 0 0 1-.75.75H5.612l4.158 3.96a.75.75 0 1 1-1.04 1.08l-5.5-5.25a.75.75 0 0 1 0-1.08l5.5-5.25a.75.75 0 1 1 1.04 1.08L5.612 9.25H16.25A.75.75 0 0 1 17 10Z" clip-rule="evenodd" />
        </svg>
        <span class="font-semibold text-gray-700">Về trang chủ</span>
    </a>
    
</body>
</html>
